<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarFighter Ace - Pro Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- 音效引擎 ---
        let audioCtx = null;
        const initAudio = () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        };
        const playEffect = (freq, type, duration, volume) => {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        };

        // --- 绘图函数 ---
        const drawShip = (ctx, x, y, w, h, type, hasShield = false) => {
            ctx.save();
            ctx.translate(x, y);
            if (type === 'player') {
                ctx.fillStyle = '#3b82f6'; ctx.beginPath();
                ctx.moveTo(w/2, 0); ctx.lineTo(w, h); ctx.lineTo(w/2, h*0.7); ctx.lineTo(0, h); ctx.closePath(); ctx.fill();
                if (hasShield) {
                    ctx.strokeStyle = '#60a5fa'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(w/2, h/2, 35, 0, Math.PI*2); ctx.stroke();
                }
            } else if (type === 'normal') {
                ctx.fillStyle = '#ef4444'; ctx.beginPath();
                ctx.moveTo(w/2, h); ctx.lineTo(w, 0); ctx.lineTo(w/2, h*0.3); ctx.lineTo(0, 0); ctx.closePath(); ctx.fill();
            } else if (type === 'elite') {
                ctx.fillStyle = '#f97316'; ctx.beginPath();
                ctx.moveTo(w/2, h); ctx.lineTo(w, h*0.2); ctx.lineTo(w*0.8, 0); ctx.lineTo(w/2, h*0.4); ctx.lineTo(w*0.2, 0); ctx.lineTo(0, h*0.2); ctx.closePath(); ctx.fill();
            } else if (type === 'boss') {
                ctx.fillStyle = '#450a0a'; ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(w/2, h); ctx.lineTo(w, h*0.5); ctx.lineTo(w, 0); ctx.lineTo(0, 0); ctx.lineTo(0, h*0.5); ctx.closePath(); ctx.fill(); ctx.stroke();
            }
            ctx.restore();
        };

        const CANVAS_WIDTH = 400;
        const CANVAS_HEIGHT = 600;

        function App() {
            const canvasRef = useRef(null);
            const [gameState, setGameState] = useState('MENU');
            const [score, setScore] = useState(0);
            const [highScore, setHighScore] = useState(parseInt(localStorage.getItem('space_high_score') || '0'));
            const [bossHp, setBossHp] = useState(0);

            const playerRef = useRef({ x: 180, y: 520, w: 40, h: 40, hasShield: true });
            const bulletsRef = useRef([]);
            const enemyBulletsRef = useRef([]);
            const enemiesRef = useRef([]);
            const itemsRef = useRef([]);
            const starsRef = useRef([]);
            const bossRef = useRef(null);
            const frameCountRef = useRef(0);
            const keysRef = useRef({});
            const requestRef = useRef();

            useEffect(() => {
                starsRef.current = Array.from({length: 60}, () => ({
                    x: Math.random() * CANVAS_WIDTH, y: Math.random() * CANVAS_HEIGHT,
                    s: Math.random() * 2 + 1
                }));
            }, []);

            const startGame = () => {
                initAudio();
                playerRef.current = { x: 180, y: 520, w: 40, h: 40, hasShield: true };
                bulletsRef.current = []; enemyBulletsRef.current = []; enemiesRef.current = [];
                itemsRef.current = []; bossRef.current = null;
                setScore(0); setBossHp(0); setGameState('PLAYING');
            };

            const update = useCallback(() => {
                const canvas = canvasRef.current;
                const ctx = canvas?.getContext('2d');
                if (!canvas || !ctx) return;

                ctx.fillStyle = bossRef.current ? '#1a0505' : '#020617';
                ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                
                ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.3;
                starsRef.current.forEach(s => { s.y = (s.y + s.s) % CANVAS_HEIGHT; ctx.fillRect(s.x, s.y, 2, 2); });
                ctx.globalAlpha = 1.0;

                if (gameState === 'PLAYING') {
                    // 核心逻辑调整：过1000分变双发，子弹变快
                    const isPoweredUp = score >= 1000;
                    const currentBulletSpeed = isPoweredUp ? 14 : 10;
                    const spawnInterval = isPoweredUp ? 35 : 45;

                    if (keysRef.current['ArrowLeft'] && playerRef.current.x > 0) playerRef.current.x -= 7;
                    if (keysRef.current['ArrowRight'] && playerRef.current.x < CANVAS_WIDTH - 40) playerRef.current.x += 7;

                    // 射击逻辑
                    if (frameCountRef.current % 10 === 0) {
                        const p = playerRef.current;
                        if (!isPoweredUp) {
                            bulletsRef.current.push({ x: p.x + 18, y: p.y, w: 4, h: 12 });
                        } else {
                            bulletsRef.current.push({ x: p.x + 5, y: p.y, w: 4, h: 12 });
                            bulletsRef.current.push({ x: p.x + 31, y: p.y, w: 4, h: 12 });
                        }
                        playEffect(800, 'triangle', 0.05, 0.05);
                    }

                    // Boss 逻辑
                    if (score > 0 && score % 2000 === 0 && !bossRef.current) {
                        bossRef.current = { x: 50, y: -100, w: 300, h: 80, hp: 50, dir: 1 };
                    }

                    if (bossRef.current) {
                        const b = bossRef.current;
                        if (b.y < 40) b.y += 1;
                        b.x += b.dir * 2.5; if (b.x <= 0 || b.x + b.w >= CANVAS_WIDTH) b.dir *= -1;
                        if (frameCountRef.current % 50 === 0) {
                            [-2, 0, 2].forEach(vx => enemyBulletsRef.current.push({ x: b.x + b.w/2, y: b.y + b.h, vx, vy: 5 }));
                        }
                        setBossHp(b.hp);
                    } else if (frameCountRef.current % spawnInterval === 0) {
                        const isTough = Math.random() > 0.8;
                        enemiesRef.current.push({ x: Math.random()*360, y: -40, w: isTough?45:30, h: 30, hp: isTough?3:1, type: isTough?'elite':'normal' });
                    }

                    // 移动
                    bulletsRef.current.forEach((b, i) => { b.y -= currentBulletSpeed; if(b.y < -20) bulletsRef.current.splice(i, 1); });
                    enemyBulletsRef.current.forEach((eb, i) => { eb.x += eb.vx; eb.y += eb.vy; if(eb.y > CANVAS_HEIGHT) enemyBulletsRef.current.splice(i, 1); });
                    enemiesRef.current.forEach((e, i) => { e.y += (isPoweredUp ? 4 : 3); if(e.y > CANVAS_HEIGHT) enemiesRef.current.splice(i, 1); });
                    itemsRef.current.forEach((it, i) => { it.y += 2.5; if(it.y > CANVAS_HEIGHT) itemsRef.current.splice(i, 1); });

                    // 碰撞检测
                    enemiesRef.current.forEach((e, ei) => {
                        bulletsRef.current.forEach((b, bi) => {
                            if (b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) {
                                bulletsRef.current.splice(bi, 1); e.hp--;
                                if (e.hp <= 0) {
                                    if(e.type === 'elite' && Math.random() < 0.5) itemsRef.current.push({x: e.x + e.w/2, y: e.y, w: 20, h: 20});
                                    enemiesRef.current.splice(ei, 1); setScore(s => s + 20); playEffect(150, 'sawtooth', 0.1, 0.1);
                                }
                            }
                        });
                        const p = playerRef.current;
                        if (p.x < e.x + e.w && p.x + 40 > e.x && p.y < e.y + e.h && p.y + 40 > e.y) {
                            if (p.hasShield) { p.hasShield = false; enemiesRef.current.splice(ei, 1); playEffect(300, 'square', 0.2, 0.2); }
                            else setGameState('GAME_OVER');
                        }
                    });

                    if (bossRef.current) {
                        bulletsRef.current.forEach((pb, pbi) => {
                            const b = bossRef.current;
                            if (pb.x < b.x + b.w && pb.x + pb.w > b.x && pb.y < b.y + b.h && pb.y + pb.h > b.y) {
                                bulletsRef.current.splice(pbi, 1); b.hp--;
                                if (b.hp <= 0) { bossRef.current = null; setScore(s => s + 1000); setBossHp(0); itemsRef.current.push({x: 190, y: 100, w: 20, h: 20}); }
                            }
                        });
                    }

                    enemyBulletsRef.current.forEach((eb, i) => {
                        const p = playerRef.current;
                        if (eb.x < p.x + p.w && eb.x + 6 > p.x && eb.y < p.y + p.h && eb.y + 6 > p.y) {
                            enemyBulletsRef.current.splice(i, 1);
                            if (p.hasShield) { p.hasShield = false; playEffect(300, 'square', 0.2, 0.2); } else setGameState('GAME_OVER');
                        }
                    });

                    itemsRef.current.forEach((it, i) => {
                        if (playerRef.current.x < it.x + it.w && playerRef.current.x + 40 > it.x && playerRef.current.y < it.y + it.h && playerRef.current.y + 40 > it.y) {
                            itemsRef.current.splice(i, 1); playerRef.current.hasShield = true; playEffect(1200, 'sine', 0.2, 0.1);
                        }
                    });

                    // 绘图
                    drawShip(ctx, playerRef.current.x, playerRef.current.y, 40, 40, 'player', playerRef.current.hasShield);
                    if (bossRef.current) drawShip(ctx, bossRef.current.x, bossRef.current.y, bossRef.current.w, bossRef.current.h, 'boss');
                    enemiesRef.current.forEach(e => drawShip(ctx, e.x, e.y, e.w, e.h, e.type));
                    ctx.fillStyle = isPoweredUp ? '#fde047' : '#facc15'; bulletsRef.current.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));
                    ctx.fillStyle = '#ef4444'; enemyBulletsRef.current.forEach(eb => { ctx.beginPath(); ctx.arc(eb.x, eb.y, 4, 0, Math.PI*2); ctx.fill(); });
                    ctx.fillStyle = '#4ade80'; itemsRef.current.forEach(it => { ctx.beginPath(); ctx.arc(it.x, it.y, 10, 0, Math.PI*2); ctx.fill(); });

                    frameCountRef.current++;
                }
                requestRef.current = requestAnimationFrame(update);
            }, [gameState, score, bossHp]);

            useEffect(() => {
                requestRef.current = requestAnimationFrame(update);
                return () => cancelAnimationFrame(requestRef.current);
            }, [update]);

            useEffect(() => {
                const dn = (e) => keysRef.current[e.code] = true;
                const up = (e) => keysRef.current[e.code] = false;
                window.addEventListener('keydown', dn); window.addEventListener('keyup', up);
                if (gameState === 'GAME_OVER' && score > highScore) { setHighScore(score); localStorage.setItem('space_high_score', score); }
                return () => { window.removeEventListener('keydown', dn); window.removeEventListener('keyup', up); };
            }, [gameState, score]);

            const handleTouch = (e) => {
                if (gameState !== 'PLAYING') return;
                const rect = canvasRef.current.getBoundingClientRect();
                const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
                playerRef.current.x = (x * CANVAS_WIDTH / rect.width) - 20;
            };

            return (
                <div className="min-h-screen flex items-center justify-center font-mono p-4 select-none touch-none" onTouchStart={initAudio} onClick={initAudio}>
                    <div className="relative border-4 border-slate-700 rounded-2xl overflow-hidden shadow-[0_0_50px_rgba(0,0,0,0.5)] bg-slate-900">
                        <div className="absolute top-4 left-4 z-10 text-blue-400 font-bold text-lg drop-shadow-md">
                            SCORE: {score} <br/>
                            <span className="text-xs text-slate-500">BEST: {highScore}</span>
                        </div>
                        
                        {bossHp > 0 && (
                            <div className="absolute top-12 left-1/2 -translate-x-1/2 w-64 h-3 bg-gray-800 rounded-full border-2 border-red-500 overflow-hidden z-20">
                                <div className="h-full bg-red-600 transition-all duration-100" style={{width: `${(bossHp/50)*100}%`}}></div>
                            </div>
                        )}

                        <canvas ref={canvasRef} width={CANVAS_WIDTH} height={CANVAS_HEIGHT} className="max-w-full h-auto block bg-black" onPointerMove={handleTouch} />
                        
                        {gameState === 'MENU' && (
                            <div className="absolute inset-0 bg-slate-900/95 flex flex-col items-center justify-center text-center p-6">
                                <h1 className="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-b from-blue-400 to-blue-800 mb-4 tracking-tighter">打飞机</h1>
                                <p className="text-slate-400 text-sm mb-12 italic tracking-widest">Desighed By ShiXiong</p>
                                <button onClick={startGame} className="px-14 py-4 bg-blue-700 text-white rounded-full font-bold text-xl hover:bg-blue-600 transition-all active:scale-95 shadow-lg shadow-blue-900/50">现在开始</button>
                            </div>
                        )}
                        
                        {gameState === 'GAME_OVER' && (
                            <div className="absolute inset-0 bg-black/90 flex flex-col items-center justify-center text-center backdrop-blur-sm">
                                <h2 className="text-6xl font-black text-white mb-2 tracking-tighter">MAYDAY!</h2>
                                <p className="text-red-500 text-2xl mb-12 font-bold underline decoration-2">SCORE: {score}</p>
                                <button onClick={startGame} className="px-12 py-4 bg-white text-slate-900 rounded-full font-bold text-lg hover:bg-slate-200 transition-all active:scale-95">REPAIR & RE-LAUNCH</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
