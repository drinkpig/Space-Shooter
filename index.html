<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Shooter - Final Fix</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 彻底移除 TypeScript 类型定义，改为纯 JS
        const { useState, useEffect, useRef, useCallback } = React;

        const CANVAS_WIDTH = 400;
        const CANVAS_HEIGHT = 600;
        const PLAYER_SPEED = 6;
        const BULLET_SPEED = 10;
        const ENEMY_SPEED_MIN = 2;
        const ENEMY_SPEED_MAX = 5;
        const SPAWN_RATE = 45;

        function App() {
            const canvasRef = useRef(null);
            const [gameState, setGameState] = useState('MENU');
            const [score, setScore] = useState(0);

            const requestRef = useRef();
            const playerRef = useRef({ x: CANVAS_WIDTH / 2 - 20, y: CANVAS_HEIGHT - 60, width: 40, height: 40 });
            const bulletsRef = useRef([]);
            const enemiesRef = useRef([]);
            const particlesRef = useRef([]);
            const starsRef = useRef([]);
            const frameCountRef = useRef(0);
            const keysRef = useRef({});

            useEffect(() => {
                const stars = [];
                for (let i = 0; i < 70; i++) {
                    stars.push({
                        x: Math.random() * CANVAS_WIDTH,
                        y: Math.random() * CANVAS_HEIGHT,
                        size: Math.random() * 2 + 0.5,
                        speed: Math.random() * 3 + 0.5
                    });
                }
                starsRef.current = stars;
            }, []);

            const createParticles = useCallback((x, y, color, count) => {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 4 + 1;
                    particlesRef.current.push({
                        x, y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 20 + Math.random() * 20,
                        maxLife: 40,
                        color,
                        size: Math.random() * 3 + 1
                    });
                }
            }, []);

            const initGame = useCallback(() => {
                playerRef.current = { x: CANVAS_WIDTH / 2 - 20, y: CANVAS_HEIGHT - 60, width: 40, height: 40 };
                bulletsRef.current = [];
                enemiesRef.current = [];
                particlesRef.current = [];
                frameCountRef.current = 0;
                setScore(0);
            }, []);

            const startGame = () => {
                initGame();
                setGameState('PLAYING');
            };

            const update = useCallback(() => {
                const canvas = canvasRef.current;
                const ctx = canvas?.getContext('2d');
                if (!canvas || !ctx) return;

                ctx.fillStyle = '#0f172a';
                ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

                ctx.fillStyle = '#ffffff';
                starsRef.current.forEach(star => {
                    star.y += star.speed;
                    if (star.y > CANVAS_HEIGHT) star.y = 0;
                    ctx.globalAlpha = star.size / 3;
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.globalAlpha = 1.0;

                if (gameState === 'PLAYING') {
                    if (keysRef.current['ArrowLeft']) playerRef.current.x -= PLAYER_SPEED;
                    if (keysRef.current['ArrowRight']) playerRef.current.x += PLAYER_SPEED;

                    if (playerRef.current.x < 0) playerRef.current.x = 0;
                    if (playerRef.current.x + playerRef.current.width > CANVAS_WIDTH) {
                        playerRef.current.x = CANVAS_WIDTH - playerRef.current.width;
                    }

                    if (frameCountRef.current % 12 === 0) {
                        bulletsRef.current.push({
                            x: playerRef.current.x + playerRef.current.width / 2 - 3,
                            y: playerRef.current.y,
                            width: 6,
                            height: 18
                        });
                    }

                    const currentSpawnRate = Math.max(15, SPAWN_RATE - Math.floor(frameCountRef.current / 600));
                    if (frameCountRef.current % currentSpawnRate === 0) {
                        const size = Math.random() * 25 + 20;
                        const isTough = Math.random() > 0.8;
                        enemiesRef.current.push({
                            x: Math.random() * (CANVAS_WIDTH - size),
                            y: -size, width: size, height: size,
                            speed: Math.random() * (ENEMY_SPEED_MAX - ENEMY_SPEED_MIN) + ENEMY_SPEED_MIN + (frameCountRef.current / 2000),
                            hp: isTough ? 3 : 1,
                            maxHp: isTough ? 3 : 1
                        });
                    }

                    bulletsRef.current.forEach(b => b.y -= BULLET_SPEED);
                    enemiesRef.current.forEach(e => e.y += e.speed);

                    for (let i = enemiesRef.current.length - 1; i >= 0; i--) {
                        const e = enemiesRef.current[i];
                        for (let j = bulletsRef.current.length - 1; j >= 0; j--) {
                            const b = bulletsRef.current[j];
                            if (b.x < e.x + e.width && b.x + b.width > e.x && b.y < e.y + e.height && b.y + b.height > e.y) {
                                bulletsRef.current.splice(j, 1);
                                e.hp -= 1;
                                createParticles(b.x + b.width/2, b.y, '#facc15', 3);
                                if (e.hp <= 0) {
                                    enemiesRef.current.splice(i, 1);
                                    setScore(s => s + (e.maxHp > 1 ? 30 : 10));
                                    createParticles(e.x + e.width/2, e.y + e.height/2, e.maxHp > 1 ? '#f97316' : '#ef4444', 15);
                                }
                                break;
                            }
                        }
                    }

                    const p = playerRef.current;
                    for (let e of enemiesRef.current) {
                        if (p.x < e.x + e.width && p.x + p.width > e.x && p.y < e.y + e.height && p.y + p.height > e.y) {
                            createParticles(p.x + p.width/2, p.y + p.height/2, '#3b82f6', 40);
                            setGameState('GAME_OVER');
                        }
                    }

                    particlesRef.current.forEach((pt, i) => {
                        pt.x += pt.vx; pt.y += pt.vy; pt.life -= 1;
                        if (pt.life <= 0) particlesRef.current.splice(i, 1);
                    });

                    ctx.fillStyle = '#3b82f6';
                    ctx.beginPath();
                    ctx.moveTo(p.x + p.width / 2, p.y);
                    ctx.lineTo(p.x + p.width, p.y + p.height);
                    ctx.lineTo(p.x, p.y + p.height);
                    ctx.closePath();
                    ctx.fill();

                    ctx.fillStyle = '#facc15';
                    bulletsRef.current.forEach(b => ctx.fillRect(b.x, b.y, b.width, b.height));

                    enemiesRef.current.forEach(e => {
                        ctx.fillStyle = e.maxHp > 1 ? '#ea580c' : '#ef4444';
                        ctx.fillRect(e.x, e.y, e.width, e.height);
                    });

                    particlesRef.current.forEach(pt => {
                        ctx.globalAlpha = pt.life / pt.maxLife;
                        ctx.fillStyle = pt.color;
                        ctx.fillRect(pt.x, pt.y, pt.size, pt.size);
                    });
                    ctx.globalAlpha = 1.0;
                    frameCountRef.current++;
                }
                requestRef.current = requestAnimationFrame(update);
            }, [gameState, createParticles, initGame]);

            useEffect(() => {
                requestRef.current = requestAnimationFrame(update);
                return () => cancelAnimationFrame(requestRef.current);
            }, [update]);

            useEffect(() => {
                const dn = (e) => keysRef.current[e.code] = true;
                const up = (e) => keysRef.current[e.code] = false;
                window.addEventListener('keydown', dn);
                window.addEventListener('keyup', up);
                return () => { window.removeEventListener('keydown', dn); window.removeEventListener('keyup', up); };
            }, []);

            const handlePointerMove = (e) => {
                if (gameState !== 'PLAYING') return;
                const canvas = canvasRef.current;
                if (!canvas) return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const x = (e.clientX - rect.left) * scaleX;
                playerRef.current.x = x - playerRef.current.width / 2;
            };

            return (
                <div className="min-h-screen bg-slate-950 flex items-center justify-center p-4 select-none">
                    <div className="relative bg-slate-900 rounded-2xl overflow-hidden border border-slate-800">
                        <div className="absolute top-4 left-4 z-10 text-white font-mono text-xl font-bold">SCORE: {score}</div>
                        <canvas 
                            ref={canvasRef} 
                            width={CANVAS_WIDTH} 
                            height={CANVAS_HEIGHT} 
                            className="block w-full max-w-[400px] h-auto touch-none" 
                            onPointerMove={handlePointerMove}
                            onPointerDown={handlePointerMove}
                        />
                        {gameState === 'MENU' && (
                            <div className="absolute inset-0 bg-slate-900/80 flex flex-col items-center justify-center">
                                <h1 className="text-4xl font-black text-blue-500 mb-6">SPACE SHOOTER</h1>
                                <button onClick={startGame} className="px-10 py-4 bg-blue-600 text-white rounded-full font-bold hover:bg-blue-500">START GAME</button>
                            </div>
                        )}
                        {gameState === 'GAME_OVER' && (
                            <div className="absolute inset-0 bg-slate-900/90 flex flex-col items-center justify-center">
                                <h2 className="text-5xl font-black text-red-500 mb-2">GAME OVER</h2>
                                <p className="text-white text-2xl mb-8">SCORE: {score}</p>
                                <button onClick={startGame} className="px-10 py-4 bg-white text-slate-900 rounded-full font-bold hover:bg-slate-200">PLAY AGAIN</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
