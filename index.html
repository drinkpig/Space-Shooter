<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Shooter: StarFighter Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- 音效引擎 ---
        let audioCtx = null;
        const initAudio = () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        };
        const playEffect = (freq, type, duration, volume) => {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        };

        // --- Canvas 繪圖輔助函數 (關鍵升級) ---
        const drawEnemyShip = (ctx, x, y, w, h, type) => {
            ctx.save();
            ctx.translate(x, y);
            
            if (type === 'normal') {
                // 🔴 普通敵機：小巧的三角形偵察機 (紅色)
                ctx.fillStyle = '#ef4444'; ctx.strokeStyle = '#7f1d1d'; ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(w / 2, h); // 頂點 (向下)
                ctx.lineTo(w, 0); ctx.lineTo(w * 0.8, 0); ctx.lineTo(w / 2, h * 0.3); ctx.lineTo(w * 0.2, 0); ctx.lineTo(0, 0);
                ctx.closePath(); ctx.fill(); ctx.stroke();
            } else if (type === 'elite') {
                // 🟠 精英敵機：中型戰鬥機 (橙色)
                ctx.fillStyle = '#f97316'; ctx.strokeStyle = '#c2410c'; ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(w / 2, h); // 主體頂點
                ctx.lineTo(w, h * 0.3); ctx.lineTo(w, 0); // 右翼
                ctx.lineTo(w / 2, h * 0.5); // 內凹
                ctx.lineTo(0, 0); ctx.lineTo(0, h * 0.3); // 左翼
                ctx.closePath(); ctx.fill(); ctx.stroke();
                // 引擎火焰效果
                ctx.fillStyle = '#fdbb2d'; ctx.fillRect(w*0.3, -2, w*0.1, Math.random()*5); ctx.fillRect(w*0.6, -2, w*0.1, Math.random()*5);
            } else if (type === 'boss') {
                // 💀 巨型 BOSS：深紅色母艦
                ctx.fillStyle = '#450a0a'; ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(w / 2, h); // 最下方頂點
                ctx.lineTo(w, h * 0.7); ctx.lineTo(w, 0); // 右側凸起
                ctx.lineTo(w * 0.7, 0); ctx.lineTo(w * 0.5, h * 0.3); ctx.lineTo(w * 0.3, 0); // 核心凹槽
                ctx.lineTo(0, 0); ctx.lineTo(0, h * 0.7); // 左側凸起
                ctx.closePath(); ctx.fill(); ctx.stroke();
                // 核心發光效果
                ctx.fillStyle = (Date.now() % 200 < 100) ? '#ef4444' : '#7f1d1d';
                ctx.beginPath(); ctx.arc(w / 2, h * 0.3, 15, 0, Math.PI * 2); ctx.fill();
            }
            
            ctx.restore();
        };

        const drawPlayerShip = (ctx, x, y, w, h, hasShield) => {
            ctx.save();
            ctx.translate(x, y);
            // 戰機主體 (藍色)
            ctx.fillStyle = '#3b82f6'; ctx.strokeStyle = '#1d4ed8'; ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(w / 2, 0); // 頂點
            ctx.lineTo(w, h); ctx.lineTo(w * 0.8, h); ctx.lineTo(w / 2, h * 0.7); ctx.lineTo(w * 0.2, h); ctx.lineTo(0, h);
            ctx.closePath(); ctx.fill(); ctx.stroke();
            // 引擎火焰
            ctx.fillStyle = '#fbbf24'; ctx.fillRect(w*0.3, h, w*0.1, Math.random()*12); ctx.fillRect(w*0.6, h, w*0.1, Math.random()*12);
            // 護盾
            if (hasShield) {
                ctx.strokeStyle = '#60a5fa'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(w / 2, h / 2, 40, 0, Math.PI * 2); ctx.stroke();
                ctx.globalAlpha = 0.15; ctx.fillStyle = '#60a5fa'; ctx.fill();
            }
            ctx.restore();
        };

        const CANVAS_WIDTH = 400;
        const CANVAS_HEIGHT = 600;

        function App() {
            const canvasRef = useRef(null);
            const [gameState, setGameState] = useState('MENU');
            const [score, setScore] = useState(0);
            const [highScore, setHighScore] = useState(parseInt(localStorage.getItem('space_high_score') || '0'));
            const [bossHp, setBossHp] = useState(0);

            const playerRef = useRef({ x: 180, y: 540, w: 40, h: 40, powerLevel: 1, hasShield: true });
            const bulletsRef = useRef([]);
            const enemyBulletsRef = useRef([]);
            const enemiesRef = useRef([]);
            const bossRef = useRef(null);
            const itemsRef = useRef([]);
            const particlesRef = useRef([]);
            const starsRef = useRef([]);
            const frameCountRef = useRef(0);
            const keysRef = useRef({});
            const requestRef = useRef();

            useEffect(() => {
                starsRef.current = Array.from({length: 80}, () => ({
                    x: Math.random() * CANVAS_WIDTH,
                    y: Math.random() * CANVAS_HEIGHT,
                    size: Math.random() * 2,
                    speed: Math.random() * 2 + 1
                }));
            }, []);

            const createParticles = (x, y, color, count) => {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 5 + 2;
                    particlesRef.current.push({
                        x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                        life: 30, color, size: Math.random() * 3
                    });
                }
            };

            const startGame = () => {
                initAudio();
                playerRef.current = { x: 180, y: 540, w: 40, h: 40, powerLevel: 1, hasShield: true };
                bulletsRef.current = []; enemyBulletsRef.current = []; enemiesRef.current = []; 
                itemsRef.current = []; particlesRef.current = []; bossRef.current = null;
                setScore(0); setBossHp(0); setGameState('PLAYING');
            };

            const update = useCallback(() => {
                const canvas = canvasRef.current;
                const ctx = canvas?.getContext('2d');
                if (!canvas || !ctx) return;

                ctx.fillStyle = bossRef.current ? '#1a0505' : '#020617'; 
                ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                
                ctx.fillStyle = '#ffffff';
                starsRef.current.forEach(s => {
                    s.y = (s.y + s.speed) % CANVAS_HEIGHT;
                    ctx.globalAlpha = 0.3; ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
                });
                ctx.globalAlpha = 1.0;

                if (gameState === 'PLAYING') {
                    playerRef.current.powerLevel = Math.floor(score / 500) + 1;

                    if (keysRef.current['ArrowLeft'] && playerRef.current.x > 0) playerRef.current.x -= 7;
                    if (keysRef.current['ArrowRight'] && playerRef.current.x < CANVAS_WIDTH - 40) playerRef.current.x += 7;

                    if (frameCountRef.current % 10 === 0) {
                        const p = playerRef.current;
                        if (p.powerLevel === 1) {
                            bulletsRef.current.push({ x: p.x + 17, y: p.y, w: 6, h: 15 });
                        } else {
                            bulletsRef.current.push({ x: p.x + 5, y: p.y, w: 6, h: 15 });
                            bulletsRef.current.push({ x: p.x + 29, y: p.y, w: 6, h: 15 });
                        }
                        playEffect(800, 'triangle', 0.05, 0.05);
                    }

                    if (score > 0 && score % 2000 === 0 && !bossRef.current) {
                        bossRef.current = { x: 50, y: -100, w: 300, h: 80, hp: 50, maxHp: 50, dir: 1, type: 'boss' };
                        playEffect(50, 'sawtooth', 1, 0.3);
                    }

                    if (bossRef.current) {
                        const b = bossRef.current;
                        if (b.y < 50) b.y += 1;
                        b.x += b.dir * 2;
                        if (b.x <= 0 || b.x + b.w >= CANVAS_WIDTH) b.dir *= -1;
                        if (frameCountRef.current % 60 === 0) {
                            [-1, 0, 1].forEach(angle => {
                                enemyBulletsRef.current.push({ x: b.x + b.w/2, y: b.y + b.h, vx: angle * 2, vy: 4 });
                            });
                            playEffect(200, 'square', 0.1, 0.1);
                        }
                        if (bossHp !== b.hp) setBossHp(b.hp);
                    } else {
                        if (frameCountRef.current % 40 === 0) {
                            const isTough = Math.random() > 0.8;
                            enemiesRef.current.push({
                                x: Math.random() * (CANVAS_WIDTH - 40), y: -40,
                                w: isTough ? 45 : 30, h: isTough ? 40 : 30,
                                hp: isTough ? 3 : 1, speed: Math.random() * 2 + 2, type: isTough ? 'elite' : 'normal'
                            });
                        }
                    }

                    bulletsRef.current.forEach((b, i) => { b.y -= 12; if(b.y < 0) bulletsRef.current.splice(i, 1); });
                    enemyBulletsRef.current.forEach((eb, i) => { eb.x += eb.vx; eb.y += eb.vy; if(eb.y > CANVAS_HEIGHT) enemyBulletsRef.current.splice(i, 1); });
                    enemiesRef.current.forEach((e, i) => { e.y += e.speed; if(e.y > CANVAS_HEIGHT) enemiesRef.current.splice(i, 1); });
                    itemsRef.current.forEach((it, i) => { it.y += 3; if(it.y > CANVAS_HEIGHT) itemsRef.current.splice(i, 1); });

                    if (bossRef.current) {
                        const b = bossRef.current;
                        bulletsRef.current.forEach((pb, pbi) => {
                            if (pb.x < b.x + b.w && pb.x + pb.w > b.x && pb.y < b.y + b.h && pb.y + pb.h > b.y) {
                                bulletsRef.current.splice(pbi, 1);
                                b.hp--;
                                createParticles(pb.x, pb.y, '#ffffff', 3);
                                if (b.hp <= 0) {
                                    createParticles(b.x + b.w/2, b.y + b.h/2, '#ef4444', 50);
                                    playEffect(100, 'sawtooth', 1, 0.5);
                                    itemsRef.current.push({ x: b.x + b.w/2, y: b.y + b.h/2, w: 20, h: 20 });
                                    bossRef.current = null;
                                    setBossHp(0);
                                    setScore(s => s + 1000);
                                }
                            }
                        });
                    }

                    enemyBulletsRef.current.forEach((eb, ebi) => {
                        const p = playerRef.current;
                        if (eb.x < p.x + p.w && eb.x + 8 > p.x && eb.y < p.y + p.h && eb.y + 8 > p.y) {
                            enemyBulletsRef.current.splice(ebi, 1);
                            if (p.hasShield) { p.hasShield = false; playEffect(300, 'square', 0.3, 0.2); }
                            else setGameState('GAME_OVER');
                        }
                    });

                    enemiesRef.current.forEach((e, ei) => {
                        bulletsRef.current.forEach((b, bi) => {
                            if (b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) {
                                bulletsRef.current.splice(bi, 1); e.hp--;
                                if (e.hp <= 0) {
                                    if (e.type === 'elite' && Math.random() < 0.3) {
                                        itemsRef.current.push({ x: e.x + e.w/2 - 10, y: e.y, w: 20, h: 20 });
                                    }
                                    enemiesRef.current.splice(ei, 1); setScore(s => s + (e.type === 'elite' ? 50 : 10));
                                    playEffect(150, 'sawtooth', 0.2, 0.1);
                                }
                            }
                        });
                        const p = playerRef.current;
                        if (p.x < e.x + e.w && p.x + 40 > e.x && p.y < e.y + e.h && p.y + 40 > e.y) {
                            if (p.hasShield) { p.hasShield = false; enemiesRef.current.splice(ei, 1); playEffect(300, 'square', 0.3, 0.2); createParticles(p.x + 20, p.y + 20, '#60a5fa', 20); }
                            else setGameState('GAME_OVER');
                        }
                    });

                    itemsRef.current.forEach((it, i) => {
                        const p = playerRef.current;
                        if (p.x < it.x + it.w && p.x + 40 > it.x && p.y < it.y + it.h && p.y + 40 > it.y) {
                            itemsRef.current.splice(i, 1);
                            p.hasShield = true; playEffect(1200, 'sine', 0.2, 0.1);
                        }
                    });

                    // --- 渲染部分 (關鍵升級：調用繪圖函數) ---
                    const p = playerRef.current;
                    drawPlayerShip(ctx, p.x, p.y, p.w, p.h, p.hasShield);

                    if (bossRef.current) {
                        const b = bossRef.current;
                        drawEnemyShip(ctx, b.x, b.y, b.w, b.h, 'boss');
                    }

                    itemsRef.current.forEach(it => {
                        ctx.fillStyle = '#4ade80'; ctx.beginPath(); ctx.arc(it.x + 10, it.y + 10, 10, 0, Math.PI*2); ctx.fill();
                    });

                    ctx.fillStyle = '#facc15'; bulletsRef.current.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));
                    ctx.fillStyle = '#ef4444'; enemyBulletsRef.current.forEach(eb => ctx.beginPath() || ctx.arc(eb.x, eb.y, 4, 0, Math.PI*2) || ctx.fill());

                    enemiesRef.current.forEach(e => {
                        drawEnemyShip(ctx, e.x, e.y, e.w, e.h, e.type);
                    });

                    particlesRef.current.forEach((pt, i) => {
                        pt.x += pt.vx; pt.y += pt.vy; pt.life--;
                        ctx.globalAlpha = pt.life / 30; ctx.fillStyle = pt.color; ctx.fillRect(pt.x, pt.y, pt.size, pt.size);
                        if (pt.life <= 0) particlesRef.current.splice(i, 1);
                    });
                    ctx.globalAlpha = 1.0; frameCountRef.current++;
                }
                requestRef.current = requestAnimationFrame(update);
            }, [gameState, score, bossHp]);

            useEffect(() => {
                requestRef.current = requestAnimationFrame(update);
                return () => cancelAnimationFrame(requestRef.current);
            }, [update]);

            useEffect(() => {
                if (gameState === 'GAME_OVER' && score > highScore) {
                    setHighScore(score); localStorage.setItem('space_high_score', score.toString());
                }
            }, [gameState, score]);

            useEffect(() => {
                const dn = (e) => keysRef.current[e.code] = true;
                const up = (e) => keysRef.current[e.code] = false;
                window.addEventListener('keydown', dn); window.addEventListener('keyup', up);
                return () => { window.removeEventListener('keydown', dn); window.removeEventListener('keyup', up); };
            }, []);

            const handleTouch = (e) => {
                if (gameState !== 'PLAYING') return;
                const rect = canvasRef.current.getBoundingClientRect();
                const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
                playerRef.current.x = (x * CANVAS_WIDTH / rect.width) - 20;
            };

            return (
                <div className="min-h-screen bg-black flex items-center justify-center p-4 select-none font-mono" onTouchStart={initAudio} onClick={initAudio}>
                    <div className="relative bg-slate-900 rounded-2xl overflow-hidden border-4 border-slate-700 shadow-2xl">
                        <div className="absolute top-4 left-4 z-10 text-blue-400 font-bold">
                            SCORE: {score} | BEST: {highScore}
                        </div>
                        
                        {bossHp > 0 && (
                            <div className="absolute top-12 left-1/2 -translate-x-1/2 w-64 h-4 bg-gray-800 border-2 border-red-500 rounded-full overflow-hidden z-20">
                                <div className="h-full bg-red-600 transition-all duration-100" style={{width: `${(bossHp/50)*100}%`}}></div>
                                <div className="absolute inset-0 text-[10px] text-white flex items-center justify-center font-black">BOSS MOTHERSHIP</div>
                            </div>
                        )}

                        <canvas ref={canvasRef} width={CANVAS_WIDTH} height={CANVAS_HEIGHT} className="block w-full max-w-[400px] h-auto touch-none" 
                            onPointerMove={handleTouch} onPointerDown={handleTouch} />
                        
                        {gameState === 'MENU' && (
                            <div className="absolute inset-0 bg-slate-900/95 flex flex-col items-center justify-center text-center p-6">
                                <drawEnemyShip(ctx, 150, 100, 100, 100, 'boss') /* 這裡無法正常執行，只是示意 */ />
                                <h1 className="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-b from-blue-300 to-blue-700 mb-8 tracking-tighter">STARFIGHTER ACE</h1>
                                <p className="text-slate-400 text-sm mb-12">Move on Screen to Survive. Fire is Automatic.</p>
                                <button onClick={startGame} className="px-12 py-4 bg-blue-700 text-white rounded-full font-bold text-xl hover:bg-blue-600 transition-all active:scale-95 shadow-lg shadow-blue-900">LAUNCH MISSION</button>
                            </div>
                        )}
                        
                        {gameState === 'GAME_OVER' && (
                            <div className="absolute inset-0 bg-black/80 flex flex-col items-center justify-center Backdrop-blur-sm">
                                <h2 className="text-5xl font-black text-white mb-2 tracking-tighter">MAYDAY! CRASHED!</h2>
                                <p className="text-red-500 text-2xl mb-12 font-bold">FINAL SCORE: {score}</p>
                                <button onClick={startGame} className="px-10 py-4 bg-white text-slate-900 rounded-full font-bold text-lg hover:bg-slate-200">RE-LAUNCH</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
